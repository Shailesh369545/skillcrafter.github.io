<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - SkillCrafters</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="contact_style.css">
</head>
<body class="bg-gray-100">

    <!-- Navigation Bar -->
    <nav class="navbar navbar-dark bg-dark shadow-lg">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="#">SkillCrafters</a>
            <a href="index.html" class="back-home-btn">← Back to Home</a>
        </div>
    </nav>

    <!-- Contact Form Section -->
    <section class="contact-section py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="contact-card p-5 shadow-lg bg-white rounded-xl">
                        <h2 class="text-center text-3xl font-bold mb-4">Get in Touch</h2>
                        <p class="text-center text-gray-600 mb-4">We would love to hear from you!</p>
                        <form id="contactForm">
                            <div class="mb-3">
                                <label class="form-label">Your Name</label>
                                <input type="text" class="form-control" id="name" placeholder="John Doe">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="you@example.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Message</label>
                                <textarea class="form-control" id="message" rows="4" placeholder="Write your message..."></textarea>
                            </div>
                            <button type="submit" class="submit-btn w-100">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3">
        <p class="m-0">© 2025 SkillCrafters. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="contact_script.js"></script>
</body>
</html>
