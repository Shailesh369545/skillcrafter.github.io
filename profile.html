<body>

    <section class="profile">
        <h2>Student Dashboard</h2>
        <p>Name: John Doe</p>
        <p>Enrolled Courses: HTML, CSS, JavaScript</p>
        <p>Certificates Earned:</p>
        <ul>
            <li><a href="certificates/html_certificate.pdf" download>HTML Certificate</a></li>
            <li><a href="certificates/css_certificate.pdf" download>CSS Certificate</a></li>
        </ul>
    </section>

</body>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        let sections = document.querySelectorAll(".section");
        
        function revealSections() {
            sections.forEach(section => {
                let sectionTop = section.getBoundingClientRect().top;
                let windowHeight = window.innerHeight;
    
                if (sectionTop < windowHeight - 100) {
                    section.classList.add("show");
                }
            });
        }
    
        window.addEventListener("scroll", revealSections);
        revealSections(); // Run once to check initial view
    });
    </script>
    
</html>
